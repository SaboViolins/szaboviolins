<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Instruments — SZABÓ István | Luthier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;family=Jost:wght@300;400;500&amp;display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="instrument-style.css">
  </head>
  <body>
    <nav> <a href="../index.html" class="nav-logo"> SZABÓ István <span>faiseur
          d'instruments&nbsp;|&nbsp;France</span> </a>
      <button class="nav-toggle" id="navToggle" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../OnTheWorkbench/index.html">On The Workbench</a></li>
        <li><a href="index.html">My Instruments</a></li>
        <li><a href="../index.html#contacts">Contacts</a></li>
      </ul>
    </nav>
    <script>
      document.getElementById('navToggle').addEventListener('click', function () {
        this.classList.toggle('open');
        document.getElementById('navLinks').classList.toggle('open');
      });
      document.querySelectorAll('#navLinks a').forEach(function(link) {
        link.addEventListener('click', function() {
          document.getElementById('navToggle').classList.remove('open');
          document.getElementById('navLinks').classList.remove('open');
        });
      });
    </script>
    <section class="post" style="padding-bottom:2rem;">
      <div class="gallery-intro">
        <p class="section-label">Gallery</p>
        <h1 class="section-title">Carved by Sound</h1>
        <span class="ornament"></span>
        <p style="color:var(--muted); font-size:0.98rem; line-height:1.8;">&nbsp;&nbsp;
          </p> </div>
      <div class="instrument-list" id="instrument-list">
        <p class="empty-state">Loading instruments…</p>
      </div>
    </section>
    <footer> <span class="footer-logo">SZABÓ István — Violin maker | Faiseur
        d'instruments</span> <span class="footer-copy">Fraisnes-en-Saintois,
        France</span> </footer>
    <script>
      const statusLabels = {
        available: { text: 'Available', cls: 'status-available' },
        sold: { text: 'Sold', cls: 'status-sold' },
        private: { text: 'Private Collection', cls: 'status-private' }
      };

      fetch('instruments.json')
        .then(response => response.json())
        .then(instruments => {
          const list = document.getElementById('instrument-list');

          const sorted = instruments.slice().sort((a, b) => b.date.localeCompare(a.date));

          if (sorted.length === 0) {
            list.innerHTML = '<p class="empty-state">No instruments listed yet — check back soon.</p>';
            return;
          }

          list.innerHTML = sorted.map(item => {
            const status = statusLabels[item.status] || statusLabels.available;
            const photos = (item.photos || []).slice(0, 3);
            const photosHtml = photos.map(p => `<img src="${p}" alt="${item.title}">`).join('');

            return `
              <article class="instrument-card">
                <div class="instrument-card-photos">${photosHtml}</div>
                <div>
                  <p class="instrument-card-info-title">
                    <a href="${item.link}">${item.displayDate} ${item.title}</a>
                    <span class="status-tag ${status.cls}">${status.text}</span>
                  </p>
                  <p class="instrument-card-summary">${item.summary}</p>
                  <a class="instrument-card-readmore" href="${item.link}">View instrument &rarr;</a>
                </div>
              </article>
            `;
          }).join('');
        })
        .catch(error => {
          document.getElementById('instrument-list').innerHTML =
            '<p class="empty-state">Could not load instruments right now.</p>';
          console.error('Error loading instruments.json:', error);
        });
    </script>
  </body>
</html>
